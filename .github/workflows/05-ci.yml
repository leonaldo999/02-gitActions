# Este archivo define un workflow de integración continua (CI) para un proyecto. El workflow se ejecuta automáticamente cada vez que se hace un push o se crea un pull request en la rama principal (main) del repositorio. El workflow incluye varios steps para preparar el entorno, instalar dependencias, ejecutar linting, pruebas y construir el proyecto.
name: 05 - CI

on:
  # Define los eventos que disparan este workflow. En este caso, se ejecutará cuando se haga un push o se cree un pull request en la rama 'main'.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: 02-gitActions

    steps:
      # Este step descarga el código del repositorio para que los siguientes steps puedan acceder a los archivos del proyecto.
      - name: Checkout code
        uses: actions/checkout@v6

      # Este step prepara el entorno para usar pnpm, una herramienta de gestión de paquetes para Node.js. Se especifica la versión de pnpm a usar y se indica que no se ejecute automáticamente 'pnpm install' después de la configuración.
      - name: Preparar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false

      # Este step instala las dependencias del proyecto utilizando pnpm. Se navega al directorio '02-gitActions' antes de ejecutar el comando de instalación. El comando 'pnpm install --frozen-lockfile' asegura que se instalen exactamente las versiones de las dependencias especificadas en el archivo lockfile, lo que ayuda a mantener la consistencia entre diferentes entornos de desarrollo y producción.
      - name: Install dependencies
        run: |
          cd 02-gitActions
          echo "::group::Instalando dependencias con pnpm"
          pnpm install --frozen-lockfile
          echo "::endgroup::"

      # Este step ejecuta el linting del proyecto utilizando pnpm. El linting es un proceso que analiza el código para encontrar errores de estilo, problemas de formato o posibles errores de programación. Es una práctica común para mantener la calidad del código y asegurar que sigue las convenciones establecidas en el proyecto.
      - name: Lint
        run: |
          cd 02-gitActions
          echo "::group::Lint"
          pnpm lint
          echo "::endgroup::"

      # Este step ejecuta las pruebas automatizadas del proyecto utilizando pnpm. Las pruebas son fundamentales para garantizar que el código funciona correctamente y para detectar posibles errores antes de que lleguen a producción. Al igual que en los steps anteriores, se navega al directorio '02-gitActions' antes de ejecutar el comando de pruebas.
      - name: Test
        run: |
          cd 02-gitActions
          echo "::group::Test"
          pnpm test
          echo "::endgroup::"

      # Este step construye el proyecto utilizando pnpm. La construcción del proyecto generalmente implica compilar el código fuente, empaquetar los archivos necesarios y preparar el proyecto para su despliegue o distribución. Al igual que en los steps anteriores, se navega al directorio '02-gitActions' antes de ejecutar el comando de construcción.
      - name: Build
        run: |
          cd 02-gitActions
          echo "::group::Build"
          pnpm build
          echo "::endgroup::"